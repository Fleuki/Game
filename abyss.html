<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>БЕЗДНА — Станция Нерей</title>
<script src="/sdk.js"></script>
<style>
:root{
  --bg0:#03060f; --bg1:#061426; --bg2:#0a2137;
  --glass:rgba(10,34,55,.62); --glass2:rgba(8,26,44,.85);
  --line:rgba(90,200,230,.18); --line2:rgba(90,200,230,.35);
  --cyan:#39d7e6; --teal:#2fe0b0; --deep:#1a6fa8;
  --txt:#cfeaf2; --dim:#7fa6b8; --warn:#ff6b6b; --gold:#ffce54; --pur:#b98bff;
  --ok:#4fe08a;
  --o2:#7fd8ff; --pw:#ffce54; --food:#8ee06a; --water:#5fb8ff; --metal:#c9b79c; --cred:#ffd76b; --res:#c98bff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  color:var(--txt);
  background:radial-gradient(120% 90% at 50% -10%, #0d2f4d 0%, var(--bg1) 40%, var(--bg0) 100%);
  user-select:none; position:relative;
}
#bubbles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bub{position:absolute;bottom:-40px;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(180,240,255,.55),rgba(80,180,220,.06));animation:rise linear infinite}
@keyframes rise{to{transform:translateY(-115vh) translateX(30px);opacity:0}}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* Topbar */
#top{display:flex;flex-wrap:wrap;gap:6px;padding:8px 8px 6px;background:linear-gradient(180deg,rgba(4,12,24,.9),rgba(4,12,24,.4));border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
.stat{flex:1 1 auto;min-width:88px;background:var(--glass);border:1px solid var(--line);border-radius:10px;padding:5px 8px;display:flex;flex-direction:column;gap:1px;position:relative;overflow:hidden}
.stat .lab{font-size:10px;color:var(--dim);letter-spacing:.4px;display:flex;align-items:center;gap:3px}
.stat .val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.stat .rate{font-size:10px;font-variant-numeric:tabular-nums}
.stat .bar{position:absolute;left:0;bottom:0;height:3px;background:var(--cyan);opacity:.5;transition:width .4s}
.rate.pos{color:var(--ok)} .rate.neg{color:var(--warn)}
.stationName{width:100%;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--dim);letter-spacing:1px}
.stationName b{color:var(--cyan);letter-spacing:2px;font-size:13px}

/* Main */
#main{flex:1;overflow-y:auto;padding:10px 8px 88px;-webkit-overflow-scrolling:touch}
.panelTitle{font-size:13px;letter-spacing:1px;color:var(--cyan);margin:2px 2px 8px;text-transform:uppercase}

/* Station — 2D-сетка: этажи + лифтовая шахта */
#station{display:flex;flex-direction:column;gap:6px}
.floor{display:flex;gap:6px;align-items:stretch;min-height:68px}
.shaftseg{flex:0 0 30px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:linear-gradient(180deg,rgba(10,34,55,.5),rgba(6,20,34,.6));border:1px solid var(--line);border-radius:5px;position:relative;overflow:hidden}
.shaftseg::before{content:'';position:absolute;top:-8px;bottom:-8px;width:4px;left:50%;transform:translateX(-50%);background:repeating-linear-gradient(180deg,rgba(90,200,230,.22) 0 6px,transparent 6px 13px);z-index:0}
.shaftseg .fnum{font-size:10px;color:var(--dim);z-index:1;background:var(--bg1);padding:1px 4px;border-radius:4px;font-variant-numeric:tabular-nums}
.shaftseg .lift{font-size:12px;z-index:1;filter:drop-shadow(0 0 4px rgba(90,200,230,.5))}
.cells{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;min-width:0}
.gcell{border:1px dashed var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:18px;opacity:.45;cursor:pointer;min-height:68px}
.gcell:active{opacity:.85}
.qhl{position:relative;z-index:5;animation:qpulse 1.5s ease-in-out infinite;border-radius:10px}
@keyframes qpulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,206,84,.85),0 0 0 0 rgba(255,206,84,.35),0 0 18px rgba(255,206,84,.25)}
  50%{box-shadow:0 0 0 3px rgba(255,206,84,.95),0 0 0 10px rgba(255,206,84,0),0 0 26px rgba(255,206,84,.45)}}
.qhl::after{content:'👆';position:absolute;right:-6px;top:-14px;font-size:17px;z-index:6;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.7));animation:qtap 1.5s ease-in-out infinite;pointer-events:none}
@keyframes qtap{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
.gcell.qhl{opacity:1;border-color:var(--gold);color:var(--gold)}
.nav-b.qhl::after{right:2px;top:-10px;font-size:14px}
.questbar{position:relative;border:1px solid rgba(255,206,84,.45);border-radius:12px;padding:10px 12px 12px;margin-bottom:10px;overflow:hidden;
  background:linear-gradient(180deg,rgba(58,46,14,.55),rgba(10,26,42,.8));box-shadow:0 0 0 1px rgba(255,206,84,.12),0 4px 20px rgba(0,0,0,.35)}
.questbar .qhead{font-size:10px;letter-spacing:1.2px;color:var(--gold);text-transform:uppercase}
.questbar .qtitle{font-size:15px;font-weight:700;margin:2px 0 3px;color:#fff}
.questbar .qhint{font-size:12px;color:var(--dim);line-height:1.45}
.questbar .qprog{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.07)}
.questbar .qprog>div{height:100%;background:linear-gradient(90deg,var(--gold),#ffe9a8);transition:width .4s}
#introArt{width:100%;max-width:330px;margin:6px auto 2px;display:block;filter:drop-shadow(0 8px 30px rgba(0,0,0,.6))}
#introArt .win{animation:winblink 4s ease-in-out infinite}
.gcell.target{opacity:1;border:2px solid var(--gold);color:var(--gold);animation:tgt 1.2s ease-in-out infinite}
@keyframes tgt{0%,100%{box-shadow:0 0 0 0 rgba(255,206,84,.35)}50%{box-shadow:0 0 0 6px rgba(255,206,84,0)}}
.floorbuy{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;border:1px dashed var(--line2);border-radius:10px;min-height:52px;color:var(--dim);font-size:12px;cursor:pointer}
.floorbuy:active{opacity:.7}
.room{background:linear-gradient(180deg,var(--glass),rgba(6,20,34,.75));border:1px solid var(--line);border-radius:10px;padding:6px 8px;display:flex;flex-direction:column;justify-content:center;gap:2px;position:relative;overflow:hidden;cursor:pointer;transition:border .2s,transform .05s;min-width:0}
.room:active{transform:scale(.98)}
.room.hurt{border-color:rgba(255,107,107,.6);animation:flash 1s infinite}
@keyframes flash{50%{border-color:rgba(255,107,107,.15)}}
.room .top{display:flex;align-items:center;gap:5px;min-width:0}
.room .ic{font-size:20px;line-height:1;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(80,220,240,.4))}
.room .rn{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room .meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.room .lvl{font-size:9px;background:rgba(90,200,230,.15);border:1px solid var(--line);border-radius:5px;padding:0 4px;color:var(--cyan)}
.room .sub{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.room .prod{font-size:10px;color:var(--teal);font-variant-numeric:tabular-nums}
.room .crew{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(120,220,240,.2);border:1px solid var(--line)}
.dot.on{background:var(--cyan);box-shadow:0 0 5px var(--cyan)}
.dot.inj{background:var(--warn);box-shadow:0 0 5px var(--warn)}
.room .pbar{position:absolute;left:0;bottom:0;height:3px;width:0;background:linear-gradient(90deg,var(--teal),var(--cyan))}

/* Ступени отсеков (tiers) по уровню */
.tstars{font-size:9px;letter-spacing:1px;margin-left:2px;white-space:nowrap}
.room.tier-2{border-color:rgba(47,224,176,.5);box-shadow:0 0 0 1px rgba(47,224,176,.12),0 2px 14px rgba(47,224,176,.08)}
.room.tier-2 .ic{filter:drop-shadow(0 0 8px rgba(47,224,176,.55))}
.room.tier-2 .pbar{background:linear-gradient(90deg,#2fe0b0,#5fe0c8)}
.room.tier-3{border-color:rgba(95,184,255,.6);box-shadow:0 0 0 1px rgba(95,184,255,.18),0 2px 18px rgba(95,184,255,.13);background:linear-gradient(180deg,rgba(18,48,78,.7),rgba(6,20,34,.82))}
.room.tier-3 .ic{filter:drop-shadow(0 0 9px rgba(95,184,255,.65))}
.room.tier-3 .pbar{height:4px;background:linear-gradient(90deg,#5fb8ff,#39d7e6)}
.room.tier-4{border-color:rgba(255,206,84,.65);box-shadow:0 0 0 1px rgba(255,206,84,.22),0 2px 24px rgba(255,206,84,.16);background:linear-gradient(180deg,rgba(58,48,18,.6),rgba(12,20,30,.86))}
.room.tier-4 .ic{filter:drop-shadow(0 0 12px rgba(255,206,84,.75))}
.room.tier-4 .pbar{height:4px;background:linear-gradient(90deg,#ffce54,#ff9b5b)}
.room.tier-up{animation:tierpulse 1.1s ease-out}
@keyframes tierpulse{0%{box-shadow:0 0 0 3px rgba(255,255,255,.85),0 0 26px rgba(255,255,255,.5)}100%{box-shadow:0 0 0 0 transparent}}

/* Слитые отсеки (size 2/3) — ширина задаётся grid-column:span */
.room.sz-3{border-width:2px}
.szbadge{font-size:9px;font-weight:700;background:rgba(57,215,230,.2);border:1px solid var(--line2);border-radius:5px;padding:0 4px;color:var(--cyan);letter-spacing:.5px}
.room.sz-3 .szbadge{background:rgba(255,206,84,.22);border-color:rgba(255,206,84,.5);color:var(--gold)}


/* ===== Визуальная идентичность отсеков ===== */
.room{--acc:#39d7e6}
.room.t-command{--acc:#b98bff} .room.t-reactor{--acc:#ffce54} .room.t-oxygen{--acc:#7fd8ff}
.room.t-farm{--acc:#8ee06a}    .room.t-desal{--acc:#5fb8ff}   .room.t-workshop{--acc:#c9a06a}
.room.t-market{--acc:#ffd76b}  .room.t-lab{--acc:#c98bff}     .room.t-quarters{--acc:#ff9bb0}
.room.t-medbay{--acc:#ff6b6b}  .room.t-storage{--acc:#9fb3c0} .room.t-gym{--acc:#ff9b5b}
.room.t-hangar{--acc:#2fe0b0}  .room.t-armory{--acc:#ff7b5b}
/* цветная светящаяся полоса слева — тип отсека читается мгновенно */
.room::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--acc);opacity:.85;box-shadow:0 0 10px var(--acc);z-index:2}
/* крупный водяной знак-иконка в фоне */
.room .wm{position:absolute;right:-6px;bottom:-10px;font-size:44px;line-height:1;opacity:.07;pointer-events:none;filter:grayscale(1)}
.room.sz-2 .wm{font-size:56px} .room.sz-3 .wm{font-size:68px}
.room .ic{filter:drop-shadow(0 0 6px var(--acc))}
.room .lvl{color:var(--acc);border-color:color-mix(in srgb,var(--acc) 45%,transparent)}
/* отсек работает — тёплое свечение и бегущий блик по прогресс-полосе */
.room.working{border-color:color-mix(in srgb,var(--acc) 40%,var(--line))}
.room.working::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 80% at 0% 100%,color-mix(in srgb,var(--acc) 16%,transparent),transparent 70%);pointer-events:none;z-index:0}
.room.working .pbar{background:linear-gradient(90deg,var(--acc),#fff);box-shadow:0 0 8px var(--acc)}
/* отсек простаивает — гаснет, сразу видно, что некому работать */
.room.idlex{filter:saturate(.45) brightness(.86)}
.room.idlex .ic{filter:grayscale(.6) opacity(.75)}
.room .top,.room .meta,.room .sub,.room .crew{position:relative;z-index:1}

/* ===== Атмосфера: свет сверху, толща воды, виньетка ===== */
#caustics{position:fixed;left:0;right:0;top:0;height:45vh;pointer-events:none;z-index:0;opacity:.5;
  background:
    radial-gradient(60% 40% at 20% -10%,rgba(120,220,255,.16),transparent 70%),
    radial-gradient(50% 35% at 70% -12%,rgba(90,200,240,.13),transparent 70%);
  animation:sway 14s ease-in-out infinite alternate}
@keyframes sway{0%{transform:translateX(-3%) scaleY(1)}100%{transform:translateX(3%) scaleY(1.08)}}
#vignette{position:fixed;inset:0;pointer-events:none;z-index:2;
  background:radial-gradient(120% 85% at 50% 35%,transparent 45%,rgba(0,4,10,.55) 100%)}
/* корпус станции вокруг плана — сетка перестаёт быть списком карточек */
#station{position:relative;padding:8px 6px;border:1px solid var(--line);border-radius:14px;
  background:linear-gradient(180deg,rgba(8,26,44,.35),rgba(3,10,20,.5));
  box-shadow:inset 0 0 40px rgba(0,0,0,.45)}
#station::before,#station::after{content:'';position:absolute;left:12px;right:12px;height:1px;
  background:linear-gradient(90deg,transparent,var(--line2),transparent)}
#station::before{top:3px} #station::after{bottom:3px}
/* сонарная развёртка на панели угрозы */
#threat .card{position:relative;overflow:hidden}
#threat .card::after{content:'';position:absolute;top:0;bottom:0;width:35%;
  background:linear-gradient(90deg,transparent,rgba(57,215,230,.10),transparent);
  animation:sweep 3.4s linear infinite}
@keyframes sweep{0%{left:-35%}100%{left:100%}}

/* Buttons & generic */
.btn{background:linear-gradient(180deg,rgba(57,215,230,.22),rgba(26,111,168,.22));border:1px solid var(--line2);color:var(--txt);border-radius:9px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;transition:filter .15s;letter-spacing:.3px}
.btn:active{filter:brightness(1.3)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.sm{padding:5px 9px;font-size:12px}
.btn.gold{background:linear-gradient(180deg,rgba(255,206,84,.25),rgba(180,130,20,.2));border-color:rgba(255,206,84,.5)}
.btn.warnb{background:linear-gradient(180deg,rgba(255,107,107,.25),rgba(120,30,30,.2));border-color:rgba(255,107,107,.5)}
.btn.full{width:100%}
.tag{font-size:10px;padding:1px 6px;border-radius:6px;border:1px solid var(--line);color:var(--dim)}
.cost{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
.cost b{color:var(--txt)}
.cost .no{color:var(--warn)}

/* Bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:5;display:flex;background:var(--glass2);border-top:1px solid var(--line2);backdrop-filter:blur(10px)}
.nav-b{flex:1;padding:8px 2px 10px;text-align:center;cursor:pointer;color:var(--dim);font-size:10px;position:relative;transition:color .15s}
.nav-b .ni{font-size:19px;display:block;margin-bottom:1px}
.nav-b.act{color:var(--cyan)}
.nav-b.act::after{content:'';position:absolute;top:0;left:20%;right:20%;height:2px;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.nav-b .badge{position:absolute;top:2px;right:calc(50% - 22px);background:var(--warn);color:#fff;font-size:9px;border-radius:8px;padding:0 4px;min-width:14px;font-weight:700}

/* cards / lists */
.card{background:var(--glass);border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:9px}
.card h3{margin:0 0 4px;font-size:14px;display:flex;align-items:center;gap:7px}
.card p{margin:3px 0;font-size:12px;color:var(--dim);line-height:1.4}
.row{display:flex;align-items:center;gap:8px}
.row.between{justify-content:space-between}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;background:rgba(90,200,230,.1);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin:2px 3px 0 0}
.bar-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--cyan))}

/* Modal */
#modal{position:fixed;inset:0;z-index:20;background:rgba(2,6,14,.72);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
#modal.show{display:flex}
.sheet{width:100%;max-width:560px;max-height:88vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg2),var(--bg1));border:1px solid var(--line2);border-radius:18px 18px 0 0;padding:14px 14px 26px;box-shadow:0 -10px 40px rgba(0,0,0,.6)}
.sheet .grip{width:44px;height:4px;background:var(--line2);border-radius:3px;margin:0 auto 12px}
.sheet h2{margin:0 0 2px;font-size:19px;display:flex;align-items:center;gap:9px}
.mut{color:var(--dim);font-size:12px}

/* dweller portrait */
.port{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--deep),var(--bg2));border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stbar{display:grid;grid-template-columns:auto 1fr auto;gap:6px;align-items:center;font-size:11px;margin:3px 0}
.stbar .sv{width:24px;text-align:right;font-weight:700;color:var(--cyan)}

/* toast / events */
#toasts{position:fixed;top:64px;left:0;right:0;z-index:30;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast{background:var(--glass2);border:1px solid var(--line2);border-radius:10px;padding:8px 14px;font-size:12px;max-width:90%;animation:pop .3s;box-shadow:0 6px 20px rgba(0,0,0,.5)}
.toast.bad{border-color:rgba(255,107,107,.6)} .toast.good{border-color:rgba(79,224,138,.6)}
@keyframes pop{from{transform:translateY(-14px);opacity:0}}
.logline{font-size:12px;padding:6px 8px;border-left:2px solid var(--line2);margin-bottom:5px;color:var(--dim)}
.logline b{color:var(--txt)}
.logline.bad{border-color:var(--warn)} .logline.good{border-color:var(--ok)} .logline.gold{border-color:var(--gold)}

/* threat banner */
#threat{margin-bottom:10px}
.attack{background:linear-gradient(180deg,rgba(90,10,20,.6),rgba(40,6,10,.7));border:1px solid rgba(255,107,107,.6);border-radius:12px;padding:11px;animation:flash 1.4s infinite}
.hpbar{height:9px;background:rgba(0,0,0,.4);border-radius:5px;overflow:hidden;margin-top:6px}
.hpbar>div{height:100%;background:linear-gradient(90deg,#ff5b5b,#ff9b5b)}

.hidden{display:none!important}
.center{text-align:center}
.small{font-size:11px}
.sep{height:1px;background:var(--line);margin:9px 0}
::-webkit-scrollbar{width:0;height:0}

/* intro */
#intro{position:fixed;inset:0;z-index:50;background:radial-gradient(120% 90% at 50% 0,#0d2f4d,#03060f);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px}
#intro h1{font-size:34px;letter-spacing:8px;margin:0;color:var(--cyan);text-shadow:0 0 24px rgba(57,215,230,.6)}
#intro .sub{color:var(--dim);letter-spacing:3px;font-size:13px}
#intro p{max-width:440px;font-size:13px;color:var(--txt);line-height:1.6;opacity:.9}
</style>
</head>
<body>
<div id="bubbles"></div>
<div id="caustics"></div>
<div id="vignette"></div>

<div id="intro">
  <div class="sub" id="i18nSub1">ГЛУБОКОВОДНАЯ СТАНЦИЯ</div>
  <h1 id="i18nTitle">БЕЗДНА</h1>
  <div class="sub" id="i18nSub2">— НЕРЕЙ · ГЛУБИНА 6&nbsp;800&nbsp;М —</div>

"Добро пожаловать на «Нерей»": "Welcome to Nereus",
"Вы на дне океана. Экипаж постоянно тратит <b>кислород, провизию и воду</b> — следите за верхней панелью: красный минус у ресурса значит, что запас тает. Нажимайте на отсеки, чтобы назначать в них жителей и улучшать их. Жёлтая подсветка 👆 показывает, куда нажать для текущей задачи.": "You are on the ocean floor. Your crew constantly burns <b>oxygen, food and water</b> — watch the top bar: a red minus means a resource is draining. Tap compartments to assign residents and upgrade them. The yellow highlight 👆 shows where to tap for the current objective.",
"У экипажа есть профессии": "Your crew has professions",

/* ---- Онбординг: открытие механик ---- */
function unlocked(k){ return !!(S.unlocks&&S.unlocks[k]); }
function queueTut(k){
  if(!S.seen[k] && S.tutQ.indexOf(k)<0 && S.activeTut!==k) S.tutQ.push(k);
  if(!S.activeTut && S.tutQ.length){ S.activeTut=S.tutQ.shift(); }
}
function dismissTut(){
  if(S.activeTut){ S.seen[S.activeTut]=true; }
  S.activeTut = S.tutQ.length? S.tutQ.shift() : null;
  render();
}
function doUnlock(k,tutKey){
  if(S.unlocks[k]) return false;
  S.unlocks[k]=1;
  if(tutKey){ queueTut(tutKey); }
  return true;
}
function checkUnlocks(){
  if(!S.unlocks) return;
  // Специализации — мягкая подсказка вскоре после старта
  if(S.t>10 && !S.seen.specs) queueTut("specs");
  // Слияние — когда впервые появляется 2-й отсек одного типа (или уже есть слитый)
  if(!S.seen.merge && mergeHintReady()) queueTut("merge");
  // Продвинутые отсеки — после мастерской
  if(hasRoom("workshop")) doUnlock("advanced","advanced");
  // Бой — когда сонар начинает что-то ловить
  if(S.threat>55 || S.attack) doUnlock("combat","combat");
  // Наука — после лаборатории
  if(hasRoom("lab")) doUnlock("research","research");
  // Экспедиции — после ангара
  if(hasRoom("hangar")) doUnlock("expedition","expedition");
}
function migrateUnlocks(){
  if(S.unlocks) return;
  S.unlocks={station:1,build:1,crew:1,log:1};
  S.seen=S.seen||{}; S.seenTab=S.seenTab||{station:1,build:1,crew:1,log:1}; S.tutQ=S.tutQ||[]; S.activeTut=S.activeTut||null;
  if(hasRoom("workshop")) S.unlocks.advanced=1;
  if(hasRoom("lab")) S.unlocks.research=1;
  if(hasRoom("hangar")) S.unlocks.expedition=1;
  if(S.threat>0||S.attack||hasRoom("armory")||S.researched.length){ S.unlocks.combat=1; }
  // всё, что открыто у опытного игрока, помечаем виденным, чтобы не сыпать карточками
  ["advanced","research","expedition","combat"].forEach(k=>{ if(S.unlocks[k]){S.seen[k]=1; S.seenTab[k]=1;} });
  Object.keys(S.unlocks).forEach(k=>S.seenTab[k]=1);
  S.seen.welcome=1;
}
function migrateItems(){
  if(!S.items) S.items=[];
  S.dwellers.forEach(d=>{
    if(!d.spec) d.spec=pick(SPEC_KEYS);
    ["weapon","suit"].forEach(slot=>{
      if(typeof d[slot]==="string"){ const it=newItem(d[slot],"common"); d[slot]=it.id; }
    });
  });
  if(S.inv){
    for(const k in S.inv){ if(!CRAFT[k])continue; const n=S.inv[k]|0; for(let i=0;i<n;i++) newItem(k,"common"); }
    delete S.inv;
  }
  // если у старого сейва уже открыт бой/крафт — не показываем карточку gear задним числом
  if(S.seen && (S.unlocks&&S.unlocks.advanced)) S.seen.gear=S.seen.gear||1;
}
function migrateRooms(){
  // старые отсеки без size → size=1. Карточку merge НЕ гасим: механика новая даже для опытного игрока.
  (S.rooms||[]).forEach(r=>{ if(r.size==null) r.size=1; });
  // назначить координаты сетки, если их нет (сейвы v3/v4 без floor/col)
  if((S.rooms||[]).some(r=>r.floor==null||r.col==null)) arrangeGrid();
  if(S.floors==null) S.floors=Math.max(2,maxFloor()+1);
  if(S.questIdx==null) S.questIdx = (S.rooms||[]).length>5 ? -1 : 0;
  S.flags=S.flags||{};
  S.buildTarget=null;
}

function makeDweller(boost){
  const g=Math.random()<.5;
  const nm=pick(FNAMES)+" "+pick(LNAMES);
  const base=()=>1+Math.floor(Math.random()*3)+(boost||0);
  return {
    id:nid(), name:nm, ic: g?"🧑‍🚀":"👩‍🚀",
    stats:{str:base(),agi:base(),int:base(),end:base(),cha:base()},
    lvl:1, xp:0, hp:0, maxhp:0, room:null, weapon:null, suit:null,
    status:"idle", train:null, exp:null, spec:pick(SPEC_KEYS),
  };
  // hp set below
}
/* ---- Предметы и редкость ---- */
function itemById(id){ return S.items?S.items.find(i=>i.id===id):null; }
function equippedIds(){ const s=new Set(); S.dwellers.forEach(d=>{ if(d.weapon)s.add(d.weapon); if(d.suit)s.add(d.suit); }); return s; }
function invItems(type){ const eq=equippedIds(); return (S.items||[]).filter(i=>CRAFT[i.key]&&CRAFT[i.key].type===type&&!eq.has(i.id)); }
function itemDmg(it){ return it?Math.round(CRAFT[it.key].dmg*RARITY[it.rar].mult):0; }
function itemHp(it){ return it?Math.round((CRAFT[it.key].hp||0)*RARITY[it.rar].mult):0; }
function itemLabel(it){ if(!it) return T("<span class=\"mut\">— нет —</span>"); const c=RARITY[it.rar].c; return `<span style="color:${c}">${CRAFT[it.key].ic} ${CRAFT[it.key].n}</span>`; }
function newItem(key,rar){ const it={id:nid(),key,rar:rar||"common"}; S.items.push(it); return it; }
function rollRarity(luck){
  luck=Math.max(0,luck||0);
  const w=RAR_KEYS.map((k,i)=>RARITY[k].w*(1+luck*0.18*i));
  const sum=w.reduce((a,b)=>a+b,0);
  let r=Math.random()*sum;
  for(let i=0;i<RAR_KEYS.length;i++){ r-=w[i]; if(r<=0) return RAR_KEYS[i]; }
  return RAR_KEYS[0];
}
function specOf(d){ return SPECS[d.spec]||SPECS.none; }

function dwellerMaxHp(d){
  let h=20+d.lvl*6+d.stats.end*3;
  const suit=itemById(d.suit);
  if(suit) h+=itemHp(suit);
  return h;
}
function initDwellerHp(d){ d.maxhp=dwellerMaxHp(d); if(d.hp<=0) d.hp=d.maxhp; }

function addRoom(type,free){
  const def=ROOMS[type];
  const r={id:nid(),type,lvl:1,prog:0,hurt:0,size:1,floor:null,col:null};
  S.rooms.push(r);
  return r;
}

/* ============================ ХЕЛПЕРЫ ============================ */
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function fmt(n){ n=Math.floor(n); if(n>=100000)return (n/1000).toFixed(0)+T("к"); if(n>=10000)return (n/1000).toFixed(1)+T("к"); return ""+n;}
function has(rk){return S.researched.includes(rk)}
function eff(key){ let v=0; S.researched.forEach(r=>{const e=RESEARCH[r].eff; if(e[key]!=null)v+=e[key];}); return v;}

function storageCap(){
  let c=250;
  S.rooms.forEach(r=>{ if(r.type==="storage") c+=250*r.lvl*(r.size||1); if(r.type==="command") c+=150; });
  return c;
}
function popCap(){
  let c=6;
  S.rooms.forEach(r=>{ if(r.type==="quarters") c+=ROOMS.quarters.popCap*r.lvl*(r.size||1); });
  return c;
}
function roomCrewCap(r){ return (1+r.lvl)*(r.size||1); } // 2 на 1 ур, +1 за уровень, ×size за слияние
function roomPowerUse(r){ const def=ROOMS[r.type]; return (def.power||0)*r.lvl*(1+((r.size||1)-1)*0.8); } // слитые чуть экономнее
function expeditionSlots(){ let s=0; S.rooms.forEach(r=>{if(r.type==="hangar")s+=r.lvl*(r.size||1);}); return s; }
function hasRoom(type){ return S.rooms.some(r=>r.type===type); }

/* ---- 2D-сетка и авто-слияние (4B) ---- */
// Занятость этажа f: массив длины FLOOR_W с id отсека (или null) в каждой клетке
function floorOccupancy(f){
  const cells=new Array(FLOOR_W).fill(null);
  S.rooms.forEach(rm=>{ if(rm.floor===f){ for(let i=0;i<(rm.size||1);i++){ const c=rm.col+i; if(c>=0&&c<FLOOR_W) cells[c]=rm.id; } } });
  return cells;
}
function maxFloor(){ let m=0; S.rooms.forEach(r=>{ if(r.floor!=null && r.floor>m) m=r.floor; }); return m; }
function floorCount(){ return Math.max(1, S.floors||1); }
function lastFloor(){ return floorCount()-1; }
// Цена нового этажа: растёт с каждым проложенным уровнем — вглубь бездны дороже
function floorCost(){
  const n=floorCount();
  const disc=1-eff("buildDisc");
  const k=Math.max(0,n-2);
  return { metal: Math.ceil(70*Math.pow(1.7,k)*disc), credits: Math.ceil(30*Math.pow(1.7,k)*disc) };
}
function freeCells(){
  let n=0;
  for(let f=0; f<floorCount(); f++){ floorOccupancy(f).forEach(v=>{ if(v==null) n++; }); }
  return n;
}
function addFloor(){
  const c=floorCost();
  if(!canAfford(c)) { toast(T("Не хватает ресурсов на новый этаж"),"bad"); return; }
  pay(c); S.floors=floorCount()+1;
  logEvent(`${T("⚙ Пробурен новый этаж — уровень")} <b>${floorCount()}</b>${T(". Свободно")} ${FLOOR_W} ${T("отсека.")}`,"gold");
  toast(`${T("⚙ Этаж")} ${floorCount()} ${T("готов")}`,"good");
  render();
}
// Ручная установка отсека в конкретную клетку; слияние с соседом того же типа и уровня
function placeAt(r,f,c){
  const cells=floorOccupancy(f);
  if(f<0||f>=floorCount()||c<0||c>=FLOOR_W||cells[c]!=null) return null;
  for(const dir of [-1,1]){
    const nb=cells[c+dir];
    if(nb==null) continue;
    const s2=roomById(nb);
    if(!s2||s2.type!==r.type||s2.lvl!==r.lvl||(s2.size||1)>=MAX_SIZE) continue;
    if(dir===-1){ s2.size=(s2.size||1)+1; }
    else { s2.col=c; s2.size=(s2.size||1)+1; }
    S.rooms=S.rooms.filter(x=>x.id!==r.id);
    return {merged:s2};
  }
  r.floor=f; r.col=c; return {placed:r};
}
function pickCell(f,c){
  S.buildTarget={f,c};
  setTab("build");
}
function clearTarget(){ S.buildTarget=null; render(); }
// Разложить все отсеки по сетке слева направо, ядро — первым (для новой игры/миграции)
function arrangeGrid(){
  const core=S.rooms.filter(r=>ROOMS[r.type].core);
  const rest=S.rooms.filter(r=>!ROOMS[r.type].core);
  let f=0,c=0;
  core.concat(rest).forEach(r=>{ const w=r.size||1; if(c+w>FLOOR_W){ f++; c=0; } r.floor=f; r.col=c; c+=w; });
}
// Поставить только что построенный отсек r в сетку; если рядом однотипный того же уровня — слить (до ×3)
function placeAndMerge(r){
  const N=lastFloor();
  for(let f=0; f<=N; f++){
    const cells=floorOccupancy(f);
    const sames=S.rooms.filter(x=>x.floor===f && x.type===r.type && x.lvl===r.lvl && x.id!==r.id && (x.size||1)<MAX_SIZE);
    for(const s of sames){
      const right=s.col+(s.size||1);
      if(right<FLOOR_W && cells[right]==null){ s.size=(s.size||1)+1; S.rooms=S.rooms.filter(x=>x.id!==r.id); return {merged:s}; }
      const left=s.col-1;
      if(left>=0 && cells[left]==null){ s.col=left; s.size=(s.size||1)+1; S.rooms=S.rooms.filter(x=>x.id!==r.id); return {merged:s}; }
    }
  }
  for(let f=0; f<=N; f++){ const cells=floorOccupancy(f); for(let c=0;c<FLOOR_W;c++){ if(cells[c]==null){ r.floor=f; r.col=c; return {placed:r}; } } }
  return null;
}
// После улучшения: если сосед того же типа и уровня оказался вплотную — объединить (до ×MAX_SIZE), сохранив экипаж
function mergeAdjacent(r){
  const cells=floorOccupancy(r.floor);
  for(const dir of [-1,1]){
    const nbCol = dir<0 ? r.col-1 : r.col+(r.size||1);
    if(nbCol<0||nbCol>=FLOOR_W) continue;
    const nbId=cells[nbCol]; if(nbId==null||nbId===r.id) continue;
    const s=roomById(nbId);
    if(!s||s.type!==r.type||s.lvl!==r.lvl) continue;
    if((r.size||1)+(s.size||1)>MAX_SIZE) continue;
    const left=(r.col<=s.col)?r:s, other=(left===r)?s:r;
    left.col=Math.min(r.col,s.col);
    left.size=(r.size||1)+(s.size||1);
    const cap=roomCrewCap(left);
    roomCrew(other).forEach(d=>{ if(roomCrew(left).length<cap){ d.room=left.id; } else { d.room=null; d.status="idle"; } });
    S.rooms=S.rooms.filter(x=>x.id!==other.id);
    left._tierUp=S.t;
    return left;
  }
  return null;
}
// Есть ли повод показать подсказку про слияние (2+ отсека одного типа или уже есть слитый)
function mergeHintReady(){
  if(S.rooms.some(r=>(r.size||1)>1)) return true;
  const seen={};
  return S.rooms.some(r=>{ if(ROOMS[r.type].core) return false; if(seen[r.type]) return true; seen[r.type]=1; return false; });
}

function acceptsCrew(r){ const def=ROOMS[r.type]; return !def.core && (def.stat!==null || r.type==="gym"); }
function roomCrew(r){ return S.dwellers.filter(d=>d.room===r.id); }
function dwellerById(id){ return S.dwellers.find(d=>d.id===id); }
function roomById(id){ return S.rooms.find(r=>r.id===id); }

// производство комнаты в секунду (без учёта энергии)
function roomOutput(r){
  const def=ROOMS[r.type];
  if(!def.produces) return 0;
  const crew=roomCrew(r);
  let contrib=0;
  crew.forEach(d=>{
    let c=(def.stat?d.stats[def.stat]:0)+(d.lvl-1);
    const sp=specOf(d);
    if(sp.rooms&&sp.rooms.includes(r.type)) c*=(1+sp.bonus);
    contrib+=c;
  });
  let mult=1+eff("allMult");
  if(boostActive()) mult*=2;
  if(def.produces==="power") mult+=eff("powerMult");
  if(["oxygen","water","food"].includes(def.produces)) mult+=eff("lifeMult");
  const size=r.size||1;
  const out=def.base*r.lvl*size*(1+contrib*0.22)*mult*(1+(size-1)*0.10);
  return out;
}
function buildCost(type){
  const def=ROOMS[type];
  const count=S.rooms.filter(r=>r.type===type).length;
  const scale=Math.pow(1.6,count);
  const disc=1-eff("buildDisc");
  const c={};
  for(const k in def.baseCost) c[k]=Math.ceil(def.baseCost[k]*scale*disc);
  if(Object.keys(c).length===0) c.metal=20;
  return c;
}
function upgradeCost(r){
  const def=ROOMS[r.type];
  const base=def.baseCost&&Object.keys(def.baseCost).length?def.baseCost:{metal:20};
  const disc=1-eff("buildDisc");
  const c={};
  for(const k in base) c[k]=Math.ceil((base[k]||20)*Math.pow(1.65,r.lvl)*disc);
  if(Object.keys(c).length===0) c.metal=Math.ceil(25*Math.pow(1.65,r.lvl));
  return c;
}
function canAfford(c){ for(const k in c){ if((S.res[k]||0)<c[k]) return false;} return true; }
function pay(c){ for(const k in c){ S.res[k]-=c[k]; } }
function costHtml(c){
  return Object.keys(c).map(k=>{
    const ok=(S.res[k]||0)>=c[k];
    return `<span class="chip">${RES[k].ic}<b class="${ok?'':'no'}" style="color:${ok?'var(--txt)':'var(--warn)'}">${c[k]}</b></span>`;
  }).join("");
}

function assignDweller(did,rid){
  const d=dwellerById(did); if(!d)return false;
  if(d.status==="expedition"||d.status==="injured") return false;
  if(rid){
    const r=roomById(rid); if(!r) return false;
    if(roomCrew(r).length>=roomCrewCap(r) && d.room!==rid) return false;
  }
  d.room=rid; d.status = rid?"working":"idle"; d.train=null;
  return true;
}

function logEvent(txt,cls){
  S.log.unshift({t:S.t,txt,cls:cls||""});
  if(S.log.length>60) S.log.pop();
}
function toast(txt,cls){

/* ============================ ИГРОВОЙ ТИК ============================ */
function tickOnce(offline){
  S.t++;
  const cap=storageCap();
  // Энергия: производство/потребление
  let powerProd=0, powerDemand=0;
  S.rooms.forEach(r=>{
    const def=ROOMS[r.type];
    if(def.produces==="power") powerProd+=roomOutput(r);
    else powerDemand+=roomPowerUse(r);
  });
  // командный отсек чуть-чуть всего
  const cmd=S.rooms.find(r=>r.type==="command");
  // энергобаланс
  S.res.power=clamp(S.res.power+powerProd,0,cap);
  let powerFactor=1;
  if(S.res.power>0){
    S.res.power=clamp(S.res.power-powerDemand,0,cap);
    if(S.res.power<=0 && powerDemand>0) powerFactor=clamp(powerProd/powerDemand,0.15,1);
  } else { powerFactor=powerDemand>0?clamp(powerProd/powerDemand,0.15,1):1; }

  // Производство остальных ресурсов
  S.rooms.forEach(r=>{
    const def=ROOMS[r.type];
    if(!def.produces||def.produces==="power") return;
    let out=roomOutput(r)*powerFactor;
    if(r.hurt>0) out*=0.3;
    r.prog=(r.prog+ (out>0? .06+out*0.01:0))%1;
    if(def.produces==="research"){ S.research+=out; }
    else { S.res[def.produces]=clamp((S.res[def.produces]||0)+out,0,cap); }
  });
  if(cmd){ ["oxygen","food","water"].forEach(k=>{ S.res[k]=clamp(S.res[k]+0.2*cmd.lvl,0,cap); }); S.res.metal=clamp(S.res.metal+0.1*cmd.lvl,0,cap); S.research+=0.03*cmd.lvl; }

  // Потребление жизнеобеспечения
  const pop=S.dwellers.length;
  const consume={oxygen:pop*0.6, food:pop*0.45, water:pop*0.45};
  let crisis=[];
  for(const k in consume){
    S.res[k]-=consume[k];
    if(S.res[k]<0){ S.res[k]=0; crisis.push(k); }
  }
  // последствия дефицита
  if(crisis.length){
    S.dwellers.forEach(d=>{ if(d.status!=="expedition"){ d.hp-=crisis.length*0.6; if(d.hp<1){d.hp=1;} }});
    if(!offline && S.t%5===0) toast(T("⚠ Дефицит: ")+crisis.map(k=>RES[k].n).join(", "),"bad");
  }

  // Лечение в лазарете
  const med=S.rooms.filter(r=>r.type==="medbay");
  if(med.length){
    let healPower=0; med.forEach(r=>{ healPower+= r.lvl*2; roomCrew(r).forEach(d=>{ let hv=d.stats.int*0.5; const sp=specOf(d); if(sp.heal) hv*=(1+sp.heal); healPower+=hv; }); });
    S.dwellers.forEach(d=>{
      if(d.status==="injured"){ d.hp+=healPower*0.2; if(d.hp>=d.maxhp){ d.hp=d.maxhp; d.status="idle"; d.room=null; logEvent("<b>"+d.name+T("</b> вылечен и снова в строю."),"good"); }}
      else if(d.hp<d.maxhp) d.hp=Math.min(d.maxhp,d.hp+healPower*0.05);
    });
  }
  // естественная регенерация чуть-чуть
  S.dwellers.forEach(d=>{ if(d.status!=="injured"&&d.hp<d.maxhp) d.hp=Math.min(d.maxhp,d.hp+0.15); if(d.hp<=0&&d.status!=="injured"){ d.hp=0; d.status="injured"; d.room=null; logEvent("<b>"+d.name+T("</b> без сознания — доставлен в лазарет."),"bad"); }});

  // Тренировки в зале
  S.rooms.filter(r=>r.type==="gym").forEach(r=>{
    roomCrew(r).forEach(d=>{
      if(!d.train) d.train=pick(Object.keys(STATS));
      d._trainp=(d._trainp||0)+ r.lvl*0.4 + d.stats.end*0.05;
      if(d._trainp>=100){ d._trainp=0; if(d.stats[d.train]<10){ d.stats[d.train]++; if(!offline)logEvent("<b>"+d.name+"</b>: "+STATS[d.train]+" +1 💪","good"); d.train=pick(Object.keys(STATS)); } }
    });
  });

  // Опыт работающим
  S.dwellers.forEach(d=>{ if(d.status==="working"){ d.xp+=0.8; const need=d.lvl*20; if(d.xp>=need){ d.xp-=need; d.lvl++; initDwellerHp(d); if(!offline)logEvent("<b>"+d.name+T("</b> достиг уровня ")+d.lvl+".","good"); }}});

  // Прирост населения
  // Новобранцы приходят только если есть жильё (жилой отсек) и хватает провизии/воды.
  if(pop<popCap()){
    let growth=0.01; // без жилья прирост почти нулевой
    S.rooms.filter(r=>r.type==="quarters").forEach(r=>{
      growth += 0.6*r.lvl*(r.size||1); // сам жилой отсек привлекает людей
      roomCrew(r).forEach(d=>{ let g=d.stats.cha*0.02*r.lvl; const sp=specOf(d); if(sp.pop) g*=(1+sp.pop); growth+=g; }); // харизматичный смотритель ускоряет
    });
    if(eff("popMult")>0) growth*=1.5;
    growth=Math.min(growth,4); // потолок: не быстрее ~1 новичка за 25с, чтобы не наплывали толпой
    if(S.res.food>50&&S.res.water>50){
      S._grow=(S._grow||0)+growth;
      if(S._grow>=100){ S._grow=0; const nd=makeDweller(); initDwellerHp(nd); S.dwellers.push(nd); logEvent(T("К станции пришвартовался новичок: <b>")+nd.name+"</b>.","good"); if(!offline)toast(T("🚪 Новый член экипажа: ")+nd.name,"good"); }
    }
  }

  // Экспедиции
  for(let i=S.expeditions.length-1;i>=0;i--){
    const e=S.expeditions[i]; e.left--;
    if(e.left<=0){ resolveExpedition(e,offline); S.expeditions.splice(i,1); S.flags.expDone=1; }
  }

  // Угроза / атака
  if(!S.attack){
    S.threat+=0.25 + S.dwellers.length*0.02 + S.rooms.length*0.03;
    if(S.threat>=100){ S.threat=0; spawnAttack(offline); }
  } else {
    processCombat(offline);
  }

  // Случайные происшествия
  if(!offline && !S.attack && Math.random()<0.006 && S.t>20){ randomIncident(); }

  // почин отсеков
  S.rooms.forEach(r=>{ if(r.hurt>0) r.hurt=Math.max(0,r.hurt-0.4); });

  // Онбординг
  if(!offline){ checkUnlocks(); checkQuest(); }
}

/* ============================ БОЙ ============================ */
function spawnAttack(offline){
  const power=S.rooms.length+S.dwellers.length+ (S.t/200|0);
  let pool=MONSTERS.filter((m,i)=> i<=clamp(Math.floor(power/4),0,MONSTERS.length-1));
  const m=pick(pool.length?pool:MONSTERS);
  const scale=1+ S.t/600;
  S.attack={name:m.n,ic:m.ic,hp:Math.ceil(m.hp*scale),maxhp:Math.ceil(m.hp*scale),dmg:m.dmg*scale};
  logEvent(T("🚨 АТАКА: <b>")+m.n+T("</b> таранит станцию!"),"bad");
  if(!offline) toast("🚨 "+m.n+T(" атакует станцию!"),"bad");
}
function crewDamage(){
  // урон в секунду от всего вооружённого экипажа (арсенал усиливает)
  let dmg=0;
  const armoryLvl=S.rooms.filter(r=>r.type==="armory").reduce((a,r)=>a+r.lvl,0);
  S.dwellers.forEach(d=>{
    if(d.status==="expedition"||d.status==="injured") return;
    let w=itemDmg(itemById(d.weapon))||1;
    let base=w*(1+d.stats.str*0.15)+d.lvl*0.4;
    const inArmory=d.room && roomById(d.room) && roomById(d.room).type==="armory";
    if(inArmory) base*=1.6;
    const sp=specOf(d);
    if(sp.combat) base*=(1+sp.combat);
    dmg+=base;
  });
  dmg*=(1+eff("dmgMult"));
  return dmg;
}
function processCombat(offline){
  const a=S.attack;
  const dps=crewDamage();
  a.hp-=dps;
  if(a.hp<=0){
    const rew={metal:20+Math.floor(a.maxhp*0.4),credits:15+Math.floor(a.maxhp*0.3)};
    S.res.metal=clamp(S.res.metal+rew.metal,0,storageCap());
    S.res.credits=clamp(S.res.credits+rew.credits,0,storageCap());
    S.research+=Math.ceil(a.maxhp*0.05);
    logEvent("✅ <b>"+a.name+T("</b> отбит! Трофеи: +")+rew.metal+" 🔩, +"+rew.credits+" 💠","good");
    if(!offline) toast(T("✅ Тварь уничтожена! +")+rew.metal+"🔩 +"+rew.credits+"💠","good");
    S.attack=null; return;
  }
  // монстр бьёт: урон снижается бронёй/арсеналом
  let dmg=a.dmg;
  const armorRes=eff("roomArmor");
  const armoryDef=S.rooms.filter(r=>r.type==="armory").reduce((a,r)=>a+r.lvl*0.06,0);
  dmg*=(1-clamp(armorRes+armoryDef,0,0.75));
  // бьёт по случайному занятому отсеку и его экипажу
  const occ=S.rooms.filter(r=>roomCrew(r).length>0 && r.type!=="command");
  if(occ.length){
    const tr=pick(occ); tr.hurt=Math.min(4,tr.hurt+1.5);
    const crew=roomCrew(tr);
    const victim=pick(crew);
    victim.hp-=dmg;
    if(victim.hp<=0){ victim.hp=0; victim.status="injured"; victim.room=null; logEvent("💀 <b>"+victim.name+T("</b> тяжело ранен ")+a.name+".","bad"); }
  } else {
    // некому защищать — бьёт по людям напрямую
    const v=pick(S.dwellers.filter(d=>d.status!=="expedition"));
    if(v){ v.hp-=dmg; if(v.hp<=0){v.hp=0;v.status="injured";v.room=null;} }
  }
}
function rushDefense(){
  if(!S.attack) return;
  // мгновенный залп: тратит немного энергии
  if(S.res.power<15){ toast(T("Недостаточно энергии для залпа"),"bad"); return; }
  S.res.power-=15;
  S.attack.hp-=crewDamage()*4+20;
  toast(T("💥 Аварийный залп!"),"good");
  if(S.attack.hp<=0) processCombat(false);
  render();
}

/* ============================ ЭКСПЕДИЦИИ ============================ */
function startExpedition(did){
  const d=dwellerById(did); if(!d) return;
  if(S.expeditions.length>=expeditionSlots()){ toast(T("Нет свободных слотов ангара"),"bad"); return; }
  if(d.status==="injured"){ toast(T("Раненый не может идти"),"bad"); return; }
  d.room=null; d.status="expedition";
  const dur=45+Math.floor(Math.random()*40); // секунд
  S.expeditions.push({did, name:d.name, left:dur, dur, depth:1+Math.floor((S.t/300))});
  logEvent("🚪 <b>"+d.name+T("</b> ушёл в экспедицию во тьму."),"");
  closeModal(); render();
}
function resolveExpedition(e,offline){
  const d=dwellerById(e.did); if(!d) return;
  const sp=specOf(d);
  const luck=(d.stats.agi+d.stats.int)*0.5 + d.lvl;
  const mult=1+eff("expMult")+(sp.expedition||0);
  const metal=Math.floor((15+Math.random()*35+luck*2)*e.depth*mult);
  const credits=Math.floor((10+Math.random()*25+luck*1.5)*e.depth*mult);
  S.res.metal=clamp(S.res.metal+metal,0,storageCap());
  S.res.credits=clamp(S.res.credits+credits,0,storageCap());
  S.research+=Math.floor(1+Math.random()*3*e.depth);
  let msg="🎁 <b>"+d.name+T("</b> вернулся: +")+metal+" 🔩, +"+credits+" 💠";
  // шанс найти снаряжение
  if(Math.random()<0.32){
    const key=pick(Object.keys(CRAFT));
    const rar=rollRarity(e.depth + (d.stats.int*0.2) + (sp.scout?2:0));
    newItem(key,rar);
    msg+=`${T(", а также")} <span style="color:${RARITY[rar].c}">${CRAFT[key].ic} ${RARITY[rar].n} ${CRAFT[key].n}</span>`;
  }
  // риск ранения
  const risk=clamp((0.28 - eff("expMult")*0.2)*(1-(sp.expRisk||0)), 0.03, 0.4);
  if(Math.random()<risk){
    d.hp-=8+Math.random()*22*e.depth/2;
    if(d.hp<=0){ d.hp=0; d.status="injured"; msg+=T(" — но вернулся тяжело раненым!"); }
    else { d.status="idle"; msg+=T(" (получил травмы)"); }
  } else { d.status="idle"; }
  if(d.status!=="injured") d.status="idle";
  d.xp+=15;
  logEvent(msg, d.status==="injured"?"bad":"gold");
  if(!offline) toast(msg,"good");
}

/* ============================ ПРОИСШЕСТВИЯ ============================ */
function randomIncident(){
  const roll=Math.random();
  const rooms=S.rooms.filter(r=>r.type!=="command");
  if(!rooms.length) return;
  const r=pick(rooms);
  if(roll<0.4){
    r.hurt=Math.min(4,r.hurt+2);
    logEvent(T("⚠ Пробоина в отсеке «")+ROOMS[r.type].n+T("» — производство падает."),"bad");
    toast(T("⚠ Утечка в «")+ROOMS[r.type].n+"»","bad");
  } else if(roll<0.7){
    const loss=Math.floor(S.res.power*0.3);
    S.res.power=Math.max(0,S.res.power-loss);
    logEvent(T("⚡ Скачок напряжения: потеряно ")+loss+T(" энергии."),"bad");
    toast(T("⚡ Перегрузка сети"),"bad");
  } else if(roll<0.85){
    S.threat=Math.min(99,S.threat+30);
    logEvent(T("📡 Сонар засёк движение в темноте... угроза растёт."),"bad");
  } else {
    // хорошее: находка
    const find=Math.floor(30+Math.random()*60);
    S.res.credits=clamp(S.res.credits+find,0,storageCap());
    logEvent(T("💠 Обломки затонувшего судна: +")+find+T(" кредитов."),"gold");
    toast(T("💠 Находка: +")+find+T(" кредитов"),"good");
  }
}

let ratesCache={};
function computeRates(){
  const r={oxygen:0,power:0,food:0,water:0,metal:0,credits:0};
  S.rooms.forEach(rm=>{ const def=ROOMS[rm.type]; if(def.produces&&def.produces!=="research"){ r[def.produces]+=roomOutput(rm); } if(def.produces==="power"){} else { r.power-=roomPowerUse(rm); }});
  const cmd=S.rooms.find(x=>x.type==="command"); if(cmd){ ["oxygen","food","water","metal"].forEach(k=>r[k]+=0.4*cmd.lvl); }
  const pop=S.dwellers.length;
  r.oxygen-=pop*0.5; r.food-=pop*0.35; r.water-=pop*0.35;
  return r;
}

function roomTile(r){
  const def=ROOMS[r.type];
  const crew=roomCrew(r), capC=roomCrewCap(r), size=r.size||1;
  let sub="";
  if(def.produces&&acceptsCrew(r)&&crew.length===0){ sub=`<span style="color:var(--gold)">👤 ${T("нет экипажа")}</span>`; }
  else if(def.produces){ const o=roomOutput(r); sub=`<span class="prod">▲ ${o.toFixed(1)} ${def.produces==="research"?"🔬":(RES[def.produces]?RES[def.produces].ic:"")}${T("/с")}</span>`; }
  else if(def.popCap) sub=`+${def.popCap*r.lvl*size} 👥`;
  else if(def.core) sub=T("Ядро станции");
  else if(r.type==="storage") sub=`+${250*r.lvl*size} ${T("запас")}`;
  else if(r.type==="hangar") sub=`${T("слоты:")} ${r.lvl*size}`;
  else if(r.type==="gym") sub=T("тренировки");
  else if(r.type==="medbay") sub=T("лечение");
  else sub=`<span style="color:var(--dim)">${def.n}</span>`;
  let dots="";
  for(let i=0;i<capC;i++){ dots+=`<span class="dot ${crew[i]?'on':''}"></span>`; }
  const szBadge = size>1?`<span class="szbadge">×${size}</span>`:'';
  const flash = (r._tierUp!=null && S.t-r._tierUp<2)?' tier-up':'';
  // работает / простаивает — читается по цвету, без чтения текста
  const needsCrew = acceptsCrew(r) && !!def.produces;
  const state = needsCrew ? (crew.length ? ' working' : ' idlex') : (def.core ? ' working' : '');
  return `<div data-q="room room-${r.type}" class="room t-${r.type} ${tierCls(r.lvl)} ${size>1?'sz-'+size:''} ${r.hurt>0?'hurt':''}${flash}${state}" style="grid-column:span ${size}" onclick="openRoom(${r.id})">
      <span class="wm">${def.ic}</span>
      <div class="top"><span class="ic">${def.ic}</span><span class="rn">${def.n}</span></div>
      <div class="meta"><span class="lvl">${T("ур.")}${r.lvl}</span>${tierStars(r.lvl)}${szBadge}</div>
      <div class="sub">${sub}</div>
      ${acceptsCrew(r)?`<div class="crew">${dots}</div>`:''}
      ${r.hurt>0?'<div style="position:absolute;top:4px;right:6px;color:var(--warn);font-size:14px">⚠</div>':''}
      <div class="pbar" style="width:${(r.prog*100)|0}%"></div>
    </div>`;
}

  h+=`<p class="small mut center">${T("Разведчики приносят металл, кредиты и очки исследований. Чем глубже — тем больше добычи и риска.")}</p>`;
  return h;
}

function renderTech(){
  let h=`<div class="panelTitle">${T("Исследования · 🔬")} ${fmt(S.research)}</div>`;
  if(!hasRoom("lab")) h+=`<div class="card"><p>${T("⚠ Постройте")} <b>${T("🔬 Лабораторию")}</b>${T(", чтобы генерировать очки исследований быстрее.")}</p></div>`;
  Object.keys(RESEARCH).forEach(k=>{
    const r=RESEARCH[k];
    const done=has(k);
    const reqOk=r.req.every(has);
    const gateOk=!r.gate||r.gate.ok();
    const afford=S.research>=r.cost;
    const reqTxt=r.req.length?`<div class="small mut">${T("Требует:")} ${r.req.map(q=>RESEARCH[q].n).join(", ")}</div>`:"";
    const gateTxt=(r.gate&&!gateOk)?`<div class="small" style="color:var(--warn)">🔒 ${T(r.gate.t)}</div>`:"";
    h+=`<div class="card" style="${done?'opacity:.65':''}"><div class="row between"><h3>${r.ic} ${r.n}</h3>${done?`<span class="tag" style="color:var(--ok);border-color:var(--ok)">${T("✓ изучено")}</span>`:`<span class="chip">🔬 ${r.cost}</span>`}</div>
      <p>${r.desc}</p>${done?'':reqTxt}${done?'':gateTxt}
      ${done?'':`<button class="btn sm ${reqOk&&gateOk&&afford?'gold':''}" ${reqOk&&gateOk&&afford?'':'disabled'} data-q="research" onclick="doResearch('${k}')">${reqOk&&gateOk?T("Изучить"):T("Заблокировано")}</button>`}</div>`;
  });
  return h;
}

function renderLog(){
  let h=`<div class="panelTitle">${T("Журнал станции")}</div>`;

/* ============================ МОДАЛКИ ============================ */
function openModal(html){ $("sheet").innerHTML=`<div class="grip"></div>`+html; $("modal").classList.add("show"); try{ applyQuestHighlight(); }catch(e){} }
function closeModal(){ $("modal").classList.remove("show"); try{ applyQuestHighlight(); }catch(e){} }
$("modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeModal(); });

let curRoom=null;
function openRoom(id){
  curRoom=id;
  if(S.flags) S.flags.openedRoom=1;
  const r=roomById(id); if(!r)return;
  const def=ROOMS[r.type];
  const crew=roomCrew(r), capC=roomCrewCap(r);
  const size=r.size||1;
  let h=`<h2>${def.ic} ${def.n} <span class="tag">${T("ур.")}${r.lvl}</span>${size>1?` <span class="szbadge">×${size}</span>`:''}</h2><div class="mut">${def.desc}</div>`;
  h+=`<p class="small" style="margin-top:4px">${T("Ступень:")} ${tierStars(r.lvl)} <span class="mut">${TIER_NAMES[roomTier(r.lvl)-1]}</span></p>`;
  if(def.produces&&def.produces!=="research") h+=`<p class="small">${T("Производство:")} <b style="color:var(--teal)">${roomOutput(r).toFixed(1)} ${RES[def.produces]?RES[def.produces].ic+"/с":""}</b>${def.stat?` · ${T("ключевой навык:")} ${STAT_IC[def.stat]} ${STATS[def.stat]}`:''}</p>`;
  if(def.produces==="research") h+=`<p class="small">${T("Очки исследований:")} <b style="color:var(--pur)">${roomOutput(r).toFixed(2)} ${T("🔬/с")}</b></p>`;
  if(r.hurt>0) h+=`<p class="small" style="color:var(--warn)">${T("⚠ Отсек повреждён — идёт ремонт.")}</p>`;

  // экипаж
  if(acceptsCrew(r)){
    h+=`<div class="sep"></div><div class="small mut">${T("Экипаж")} ${crew.length}/${capC}</div>`;
    crew.forEach(d=>{
      const m=specOf(d).rooms&&specOf(d).rooms.includes(r.type);
      h+=`<div class="row between" style="padding:5px 0"><div class="row"><div class="port">${d.ic}</div><div><div class="small" style="font-weight:600">${d.name} ${specOf(d).ic}${m?' <span style="color:var(--gold)">★</span>':''}</div><div class="small mut">${T("ур.")}${d.lvl}${def.stat?` · ${STAT_IC[def.stat]} ${d.stats[def.stat]}`:''}${r.type==='gym'&&d.train?` · ${T("качает")} ${STATS[d.train]}`:''}</div></div></div><button class="btn sm" onclick="assignDweller(${d.id},null);openRoom(${id})">${T("Убрать")}</button></div>`;
    });
    if(crew.length<capC){
      const idle=S.dwellers.filter(d=>d.status==="idle");
      if(idle.length){
        h+=`<div class="small mut" style="margin-top:6px">${T("Назначить:")}</div>`;
        idle.sort((a,b)=>{ const ma=specOf(a).rooms&&specOf(a).rooms.includes(r.type)?1:0; const mb=specOf(b).rooms&&specOf(b).rooms.includes(r.type)?1:0; return mb-ma; });
        idle.slice(0,8).forEach(d=>{
          const m=specOf(d).rooms&&specOf(d).rooms.includes(r.type);
          h+=`<div class="row between" style="padding:4px 0"><div class="row"><div class="port">${d.ic}</div><div class="small">${d.name} ${specOf(d).ic}${m?' <span style="color:var(--gold)">★</span>':''}${def.stat?` · ${STAT_IC[def.stat]} ${d.stats[def.stat]}`:''}</div></div><button class="btn sm gold" data-q="assign" onclick="assignDweller(${d.id},${id});openRoom(${id})">＋</button></div>`;
        });
      } else h+=`<p class="small mut">${T("Свободного экипажа нет.")}</p>`;
    }
  }

  // мастерская — крафт
  if(r.type==="workshop"){
    const disc=craftDiscount(r);
    h+=`<div class="sep"></div><div class="small mut">${T("🔧 Крафт снаряжения")}${disc<1?` · <span style="color:var(--teal)">${T("механик: −20% и выше шанс редкости")}</span>`:` · ${T("редкость выпадает случайно")}`}</div>`;
    Object.keys(CRAFT).filter(ck=>CRAFT[ck].type==="suit"||unlocked("combat")).forEach(ck=>{
      const it=CRAFT[ck];
      const c={}; for(const k in it.cost)c[k]=Math.ceil(it.cost[k]*disc);
      const resOk=S.research>=it.res;
      const ok=canAfford(c)&&resOk;
      const label = it.type==="weapon"?`${T("урон +")}${it.dmg}`:`${T("броня +")}${it.hp} ❤`;
      h+=`<div class="row between" style="padding:5px 0;border-bottom:1px solid var(--line)"><div><div class="small" style="font-weight:600">${it.ic} ${it.n}</div><div class="small mut">${label} · ${costHtml(c)}${it.res?` <span class="chip">🔬${it.res}</span>`:''}</div></div><button class="btn sm ${ok?'gold':''}" ${ok?'':'disabled'} onclick="craftItem('${ck}')">${T("Собрать")}</button></div>`;
    });
  }

  // слитый отсек: показать состав
  if(size>1){
    h+=`<div class="sep"></div><div class="small mut">${T("⧉ Объединённый блок из")} <b>${size}</b> ${T("отсеков (")}${size} ${T("клетки в ряду). Улучшается целиком, вмещает больше экипажа и экономит энергию.")}</div>`;
  }

  // улучшение (уровень 5 — предел, отсек становится элитным)
  if(r.lvl>=MAX_ROOM_LVL){
    h+=`<div class="sep"></div><div class="row between"><div class="small" style="font-weight:600;color:var(--gold)">${T("✦ Элитный отсек — максимальный уровень")}</div>${tierStars(r.lvl)}</div>`;
  } else {
    const uc=upgradeCost(r);
    const okU=canAfford(uc);
    h+=`<div class="sep"></div><div class="row between"><div><div class="small" style="font-weight:600">${T("Улучшить до ур.")}${r.lvl+1}</div><div class="small mut">${costHtml(uc)}</div></div><button class="btn ${okU?'gold':''}" ${okU?'':'disabled'} data-q="upgrade" onclick="doUpgrade(${id})">${T("▲ Улучшить")}</button></div>`;
  }
  if(!def.core){
    h+=`<div style="margin-top:10px"><button class="btn sm warnb" onclick="demolish(${id})">${T("Снести отсек")}</button></div>`;
  }
  openModal(h);
}

function openDweller(id){
  const d=dwellerById(id); if(!d)return;
  initDwellerHp(d);
  const sp=specOf(d);
  let h=`<h2>${d.ic} ${d.name}</h2><div class="mut">${T("Уровень")} ${d.lvl} ${T("· Опыт")} ${Math.floor(d.xp)}/${d.lvl*20} · ❤ ${Math.ceil(d.hp)}/${d.maxhp}</div>`;
  h+=`<div class="bar-wrap" style="margin:8px 0"><div class="bar-fill" style="width:${d.hp/d.maxhp*100}%;background:${d.hp<d.maxhp*0.4?'var(--warn)':'linear-gradient(90deg,#2fe0b0,#39d7e6)'}"></div></div>`;
  // специализация
  h+=`<div class="card" style="margin:0 0 8px;padding:9px"><div class="row between"><div><div style="font-weight:600">${sp.ic} ${sp.n}</div><div class="small mut">${sp.desc}</div></div><button class="btn sm" onclick="openRespec(${id})">🎓</button></div></div>`;
  for(const s in STATS){
    h+=`<div class="stbar"><span>${STAT_IC[s]} ${STATS[s]}</span><div class="bar-wrap"><div class="bar-fill" style="width:${d.stats[s]/10*100}%"></div></div><span class="sv">${d.stats[s]}</span></div>`;
  }
  h+=`<div class="sep"></div><div class="small mut">${T("Снаряжение")}</div>`;
  const wI=itemById(d.weapon), sI=itemById(d.suit);
  h+=`<div class="grid2" style="margin-top:6px">
    <div class="row between chip" style="justify-content:space-between">🗡 ${itemLabel(wI)}${wI?` <span style="color:var(--warn)" onclick="unequip(${id},'weapon')">✕</span>`:''}</div>
    <div class="row between chip" style="justify-content:space-between">🛡 ${itemLabel(sI)}${sI?` <span style="color:var(--warn)" onclick="unequip(${id},'suit')">✕</span>`:''}</div></div>`;
  if(wI) h+=`<div class="small mut" style="margin-top:3px">${T("Оружие: урон +")}${itemDmg(wI)}</div>`;
  if(sI) h+=`<div class="small mut">${T("Костюм: броня +")}${itemHp(sI)} ❤</div>`;
  // инвентарь для экипировки
  const weapons=invItems("weapon"), suits=invItems("suit");
  if(weapons.length||suits.length){
    h+=`<div class="small mut" style="margin-top:8px">${T("Надеть со склада:")}</div><div>`;
    weapons.forEach(it=>h+=`<button class="btn sm" data-q="equipbtn" style="margin:3px 3px 0 0;border-color:${RARITY[it.rar].c}" onclick="equip(${id},${it.id})">${CRAFT[it.key].ic} <span style="color:${RARITY[it.rar].c}">${CRAFT[it.key].n}</span> +${itemDmg(it)}</button>`);
    suits.forEach(it=>h+=`<button class="btn sm" data-q="equipbtn" style="margin:3px 3px 0 0;border-color:${RARITY[it.rar].c}" onclick="equip(${id},${it.id})">${CRAFT[it.key].ic} <span style="color:${RARITY[it.rar].c}">${CRAFT[it.key].n}</span> +${itemHp(it)}❤</button>`);
    h+=`</div>`;
  } else {
    h+=`<p class="small mut">${T("Снаряжение крафтится в 🔩 Мастерской или находится в экспедициях, затем надевается здесь.")}</p>`;
  }
  h+=`<div class="sep"></div>`;
  if(d.status==="injured"){ h+=`<p class="small" style="color:var(--warn)">${T("⛑ Ранен — лечится в лазарете (или медленно сам).")}</p>`; }
  else {
    if(d.status!=="expedition"){
      const opts=S.rooms.filter(r=>acceptsCrew(r)&&roomCrew(r).length<roomCrewCap(r)&&r.id!==d.room);
      if(opts.length){
        opts.sort((a,b)=>{ const ma=sp.rooms&&sp.rooms.includes(a.type)?1:0; const mb=sp.rooms&&sp.rooms.includes(b.type)?1:0; return mb-ma; });
        h+=`<div class="small mut" style="margin-bottom:4px">${T("Назначить в отсек:")} <span class="small">★ — ${T("бонус специализации")}</span></div><div style="margin-bottom:8px">`;
        opts.slice(0,10).forEach(r=>{
          const m=sp.rooms&&sp.rooms.includes(r.type);
          h+=`<button class="btn sm" style="margin:3px 3px 0 0${m?';border-color:rgba(255,206,84,.6)':''}" onclick="assignDweller(${id},${r.id});openDweller(${id})">${ROOMS[r.type].ic} ${ROOMS[r.type].n}${m?' <span style="color:var(--gold)">★</span>':''}</button>`;
        });
        h+=`</div>`;
      }
    }
    h+=`<div class="row" style="gap:8px;flex-wrap:wrap"><button class="btn sm" onclick="closeModal();setTab('crew')">${T("👥 К экипажу")}</button>`;
    if(d.room) h+=`<button class="btn sm" onclick="assignDweller(${id},null);openDweller(${id})">${T("Снять с работы")}</button>`;
    if(expeditionSlots()>S.expeditions.length) h+=`<button class="btn sm gold" onclick="startExpedition(${id})">${T("🚪 В экспедицию")}</button>`;
    h+=`</div>`;
  }
  openModal(h);
}

const RESPEC_COST=150;
function openRespec(id){
  const d=dwellerById(id); if(!d)return;
  const free=d.spec==="none";
  let h=`<h2>${T("🎓 Переобучение")}</h2><div class="mut">${d.name}${T(". Смена специализации:")} <b>${free?T("бесплатно"):RESPEC_COST+' 💠'}</b>.</div><div class="sep"></div>`;
  SPEC_KEYS.forEach(k=>{
    const sp=SPECS[k]; const cur=d.spec===k;
    const canDo=free||S.res.credits>=RESPEC_COST;
    h+=`<div class="row between" style="padding:6px 0;border-bottom:1px solid var(--line)"><div style="flex:1"><div style="font-weight:600">${sp.ic} ${sp.n}${cur?` <span class="tag" style="color:var(--ok);border-color:var(--ok)">${T("текущая")}</span>`:''}</div><div class="small mut">${sp.desc}</div></div>${cur?'':`<button class="btn sm ${canDo?'gold':''}" ${canDo?'':'disabled'} onclick="doRespec(${id},'${k}')">${T("Выбрать")}</button>`}</div>`;
  });
  h+=`<div style="margin-top:10px"><button class="btn sm" onclick="openDweller(${id})">${T("← Назад")}</button></div>`;
  openModal(h);
}
function doRespec(id,k){
  const d=dwellerById(id); if(!d)return;
  if(d.spec!=="none"){ if(S.res.credits<RESPEC_COST){toast(T("Не хватает кредитов"),"bad");return;} S.res.credits-=RESPEC_COST; }
  d.spec=k;
  logEvent(`🎓 <b>${d.name}</b> ${T("— новая специализация:")} ${SPECS[k].ic} ${SPECS[k].n}.`,"good");
  toast(`🎓 ${d.name}: ${SPECS[k].n}`,"good");
  openDweller(id); render();
}

/* ============================ ДЕЙСТВИЯ ============================ */
function doBuild(type){
  const c=buildCost(type);
  if(!canAfford(c)) return;
  const t=S.buildTarget;
  if(t==null && freeCells()===0){ toast(T("Нет свободных клеток — пробурите новый этаж"),"bad"); return; }
  pay(c); const r=addRoom(type);
  let res = t ? placeAt(r,t.f,t.c) : placeAndMerge(r);
  if(res==null) res = placeAndMerge(r);
  if(res==null){ S.rooms=S.rooms.filter(x=>x.id!==r.id); for(const k in c) S.res[k]+=c[k]; toast(T("Нет места для отсека"),"bad"); return; }
  S.buildTarget=null;
  if(res.merged){
    S.seen.merge=1;
    logEvent(`🏗 <b>${ROOMS[type].n}</b> ${T("пристроен к однотипному и объединён — теперь ×")}${res.merged.size}.`,"gold");
    toast(`⧉ ${ROOMS[type].n} ×${res.merged.size}`,"good");
  } else {
    logEvent(T("🏗 Построен отсек: <b>")+ROOMS[type].n+"</b>.","good");
  }
  setTab("station");
}
function doUpgrade(id){
  const r=roomById(id);
  if(r.lvl>=MAX_ROOM_LVL){ toast(T("Отсек уже элитный — максимальный уровень"),"bad"); return; }
  const c=upgradeCost(r);
  if(!canAfford(c)) return;
  const oldTier=roomTier(r.lvl);
  pay(c); r.lvl++;
  const newTier=roomTier(r.lvl);
  if(newTier>oldTier){
    r._tierUp=S.t;
    logEvent(`✦ «${ROOMS[r.type].n}${T("» вышел на новую ступень —")} <b>${TIER_NAMES[newTier-1]}</b> ${tierStars(r.lvl)}`,"gold");
    toast(`✦ ${ROOMS[r.type].n}: ${TIER_NAMES[newTier-1]} ${"★".repeat(newTier)}`,"good");
  } else {
    logEvent("▲ «"+ROOMS[r.type].n+T("» улучшен до ур.")+r.lvl+".","good");
  }
  const m=mergeAdjacent(r); // если рядом такой же отсек того же уровня — объединятся
  if(m){ logEvent(`⧉ «${ROOMS[m.type].n}${T("» объединён с соседним того же уровня — теперь ×")}${m.size}.`,"gold"); toast(`⧉ ${ROOMS[m.type].n} ×${m.size}`,"good"); }
  openRoom((m||r).id); render();
}
function demolish(id){
  const r=roomById(id);
  if(ROOMS[r.type].core){ toast(T("Ядро станции нельзя снести"),"bad"); return; }
  roomCrew(r).forEach(d=>{d.room=null;d.status="idle";});
  S.rooms=S.rooms.filter(x=>x.id!==id);
  // частичный возврат
  const back=Math.floor(20*r.lvl*(r.size||1)); S.res.metal=clamp(S.res.metal+back,0,storageCap());
  logEvent(T("Отсек «")+ROOMS[r.type].n+T("» демонтирован (+")+back+" 🔩).","");
  closeModal(); render();
}
function doResearch(k){
  const r=RESEARCH[k];
  if(S.research<r.cost||!r.req.every(has)||(r.gate&&!r.gate.ok())) return;
  S.research-=r.cost; S.researched.push(k);
  logEvent(T("🔬 Изучено: <b>")+r.n+"</b>.","gold");
  toast(T("🔬 Открытие: ")+r.n,"good");
  render();
}
function craftDiscount(ws){ return (ws&&roomCrew(ws).some(d=>d.spec==="mechanic"))?0.8:1; }
function craftItem(ck){
  const it=CRAFT[ck];
  const ws=roomById(curRoom);
  const disc=craftDiscount(ws);
  const c={}; for(const k in it.cost) c[k]=Math.ceil(it.cost[k]*disc);
  if(!canAfford(c)||S.research<it.res) return;
  pay(c);
  let luck=(ws?ws.lvl-1:0);
  if(ws) roomCrew(ws).forEach(d=>{ if(d.spec==="mechanic") luck+=2; });
  const rar=rollRarity(luck);
  newItem(ck,rar);
  const label=`<span style="color:${RARITY[rar].c}">${RARITY[rar].n} ${it.n}</span>`;
  logEvent(`${T("🔧 Собрано:")} <b>${label}</b>${T(". Наденьте на экипаж.")}`, rar==="common"?"good":"gold");
  toast(`🔧 ${it.ic} ${label}`,"good");
  queueTut("gear");
  openRoom(curRoom);
}
function equip(did,itemId){
  const d=dwellerById(did); const it=itemById(itemId);
  if(!it) return;
  const slot=CRAFT[it.key].type==="weapon"?"weapon":"suit";
  d[slot]=it.id; initDwellerHp(d);
  toast(d.name+T(" надел ")+CRAFT[it.key].ic+" "+RARITY[it.rar].n+" "+CRAFT[it.key].n,"good");
  openDweller(did);
}
function unequip(did,slot){
  const d=dwellerById(did); if(!d) return;
  d[slot]=null; initDwellerHp(d);
  openDweller(did);
}

/* Куда смотреть игроку: первый совпавший селектор подсвечивается.
   Порядок важен — сначала цель на текущем экране, потом кнопка перехода. */
const QUEST_TARGETS = {
  look:      ['[data-q~="room"]'],
  // Строим через ＋ на пустой клетке; на экране постройки горит кнопка нужного отсека.
  desal:     ['[data-q="build-desal"]', '[data-q="cell"]'],
  crewdesal: ['[data-q="assign"]', '[data-q~="room-desal"]', '[data-q="nav-station"]'],
  floor:     ['[data-q="drill"]', '[data-q="nav-station"]'],
  // Слияние: ＋ рядом с опреснителем на плане → «Построить» у опреснителя на экране постройки.
  merge:     ['[data-q="build-desal"]', '[data-q="cell"]', '[data-q="nav-station"]'],
  upgrade:   ['[data-q="upgrade"]', '[data-q~="room-desal"]', '[data-q~="room"]', '[data-q="nav-station"]'],
  workshop:  ['[data-q="build-workshop"]', '[data-q="cell"]'],
  craft:     ['[data-q~="room-workshop"]', '[data-q="nav-station"]'],
  equip:     ['[data-q="equipbtn"]', '[data-q="dweller"]', '[data-q="nav-crew"]'],
  // Как только лаборатория готова — ведём в «Науку» на исследование.
  lab:       ()=> hasRoom("lab")
                   ? ['[data-q="research"]', '[data-q="nav-tech"]']
                   : ['[data-q="build-lab"]', '[data-q="cell"]'],
  // Построили ангар — дальше отправляем разведчика во вкладке «Бездна».
  hangar:    ()=> hasRoom("hangar")
                   ? ['[data-q="send"]', '[data-q="nav-expedition"]']
                   : ['[data-q="build-hangar"]', '[data-q="cell"]'],
};
function applyQuestHighlight(){
  document.querySelectorAll(".qhl").forEach(el=>el.classList.remove("qhl"));
  const q=currentQuest(); if(!q) return;
  let list=QUEST_TARGETS[q.id]; if(typeof list==="function") list=list();
  if(!list) return;
  const modal=$("modal");
  const inModal = !!modal && modal.classList.contains("show");
  // закрытая модалка сохраняет разметку в DOM — её элементы целями быть не должны
  const pick = sel => {
    if(inModal){ const e=modal.querySelector(sel); if(e) return e; }
    const all=document.querySelectorAll(sel);
    for(const e of all){ if(!modal || !modal.contains(e)) return e; }
    return null;
  };
  for(const sel of list){
    const el=pick(sel);
    if(el){ el.classList.add("qhl"); return; }
  }
}
// Куда ведёт кнопка «Перейти →»: для двухшаговых задач — на второй шаг, как только первый выполнен.
function questGoTab(q){
  if(q.id==="lab")    return hasRoom("lab")    ? "tech"       : null;
  if(q.id==="hangar") return hasRoom("hangar") ? "expedition" : null;
  if(q.tab==="build") return null; // строить теперь только через ＋ на плане станции
  return q.tab;
}
function questIdx(){ return S.questIdx==null ? 0 : S.questIdx; }
function currentQuest(){ const i=questIdx(); return (i>=0 && i<QUESTS.length) ? QUESTS[i] : null; }
function skipTutorial(){ if(!confirm(T("Скрыть обучение насовсем? Подсказки-задачи больше не появятся."))) return; S.questIdx=-1; toast(T("Обучение скрыто"),"good"); render(); }
function checkQuest(){
  const q=currentQuest(); if(!q) return;
  let ok=false; try{ ok=q.check(); }catch(e){ ok=false; }
  if(!ok) return;
  const r=q.rew||{};
  for(const k in r) S.res[k]=clamp((S.res[k]||0)+r[k],0,storageCap());
  const rewTxt=Object.keys(r).map(k=>`${RES[k].ic}+${r[k]}`).join(" ");
  S.questIdx=questIdx()+1;
  logEvent(`${T("🎯 Задача выполнена:")} <b>${T(q.t)}</b>. ${rewTxt}`,"gold");
  toast(`${T("🎯 Готово!")} ${rewTxt}`,"good");
}
function questBar(){
  const q=currentQuest(); if(!q) return "";
  const r=q.rew||{};
  const rewTxt=Object.keys(r).map(k=>`<span class="chip">${RES[k].ic}+${r[k]}</span>`).join("");
  const n=questIdx()+1;
  return `<div class="questbar">
    <div class="row between" style="align-items:flex-start">
      <div style="min-width:0">
        <div class="qhead">${T("🎯 Задача")} ${n}/${QUESTS.length}</div>
        <div class="qtitle">${T(q.t)}</div>
        <div class="qhint">${T(q.x)}</div>
      </div>
      <button class="btn sm" style="flex-shrink:0" onclick="skipTutorial()">${T("Скрыть")}</button>
    </div>
    <div class="row" style="gap:6px;margin-top:7px;align-items:center">
      <span class="small mut">${T("Награда:")}</span>${rewTxt}
      ${(()=>{const gt=questGoTab(q); return gt && S.tab!==gt ? `<button class="btn sm gold" style="margin-left:auto" onclick="setTab('${gt}')">${T("Перейти →")}</button>` : '';})()}
    </div>
    <div class="qprog"><div style="width:${(questIdx()/QUESTS.length*100).toFixed(0)}%"></div></div>
  </div>`;
}

/* ============================ YANDEX GAMES SDK ============================ */
const YA = {
  sdk:null, player:null, ready:false, cloud:false, cloudData:null,
  lastCloudSave:0, adReady:true, introShown:false,
  async init(){
    if(typeof YaGames==="undefined") return;           // локальный запуск вне платформы
    try{
      this.sdk = await YaGames.init();
      this.ready = true;
      // сигнал платформе, что игра загрузилась
      try{ this.sdk.features.LoadingAPI.ready(); }catch(e){}
      // язык платформы: если не совпал с текущим — перезагрузимся один раз
      try{
        const l = this.sdk.environment.i18n.lang;
        const want = (l && l.indexOf("ru")===0) ? "ru" : "en";
        if(want!==LANG && !localStorage.getItem("abyss_lang")){
          localStorage.setItem("abyss_lang", want);
          if(!sessionStorage.getItem("abyss_lang_reload")){
            sessionStorage.setItem("abyss_lang_reload","1");
            location.reload(); return;
          }
        }
      }catch(e){}
      // облачные сейвы
      try{
        this.player = await this.sdk.getPlayer({ scopes:false });
        this.cloud = true;
        const d = await this.player.getData(["save"]);
        if(d && d.save) this.cloudData = d.save;
        refreshIntroHint();
      }catch(e){ this.cloud=false; }
    }catch(e){ this.ready=false; }
  },
  // облачное сохранение, не чаще раза в 20 секунд
  saveCloud(force){
    if(!this.cloud || !this.player || !S) return;
    const now=Date.now();
    if(!force && now-this.lastCloudSave < 20000) return;
    this.lastCloudSave = now;
    try{ this.player.setData({ save:S }, false); }catch(e){}
  },
  // межстраничная реклама — вызывается на естественных паузах
  fullscreen(){
    if(!this.ready) return;
    try{ this.sdk.adv.showFullscreenAdv({ callbacks:{ onError:()=>{} } }); }catch(e){}
  },
  // видео с наградой: onDone вызывается только при полном просмотре
  rewarded(onDone){
    if(!this.ready){ toast(T("Реклама недоступна"),"bad"); return; }
    let got=false;
    try{
      this.sdk.adv.showRewardedVideo({ callbacks:{
        onRewarded: ()=>{ got=true; },
        onClose: ()=>{ if(got){ onDone(); render(); } },
        onError: ()=>{ toast(T("Реклама недоступна"),"bad"); }
      }});
    }catch(e){ toast(T("Реклама недоступна"),"bad"); }
  }
};

/* ---- Награды за просмотр рекламы ---- */
const BOOST_SECONDS = 4*3600;
function boostActive(){ return S && S.boostUntil!=null && S.t < S.boostUntil; }
function boostLeft(){ return boostActive() ? Math.max(0, Math.ceil(S.boostUntil - S.t)) : 0; }
function adBoost(){
  YA.rewarded(()=>{
    S.boostUntil = S.t + BOOST_SECONDS;
    logEvent(T("⚡ Ускорение производства ×2 на 4 часа."),"gold");
    toast(T("⚡ ×2 к производству на 4 часа"),"good");
  });
}
function adHeal(){
  const hurt = S.dwellers.filter(d=>d.status==="hurt" || d.hp < d.maxhp);
  if(!hurt.length){ toast(T("Раненых нет"),"bad"); return; }
  YA.rewarded(()=>{
    hurt.forEach(d=>{ d.hp=d.maxhp; if(d.status==="hurt") d.status="idle"; });
    logEvent(T("⛑ Медицинский дрон вылечил весь экипаж."),"good");
    toast(T("⛑ Экипаж вылечен"),"good");
  });
}
function adRush(){
  if(!S.expeditions.length){ toast(T("Нет активных экспедиций"),"bad"); return; }
  YA.rewarded(()=>{
    S.expeditions.forEach(e=>{ e.left=1; });
    toast(T("🚪 Разведчики возвращаются"),"good");
  });
}
function adBar(){
  if(!YA.ready) return "";
  let h=`<div class="card" style="margin-top:10px"><div class="small mut" style="margin-bottom:6px">${T("📺 Бонусы за рекламу")}</div><div class="row" style="gap:6px;flex-wrap:wrap">`;
  if(boostActive()){
    const m=Math.ceil(boostLeft()/60);
    h+=`<span class="chip" style="color:var(--gold)">${T("⚡ ×2 активно")} · ${m} ${T("мин")}</span>`;
  } else {
    h+=`<button class="btn sm gold" onclick="adBoost()">${T("⚡ ×2 производство (4 ч)")}</button>`;
  }
  h+=`<button class="btn sm" onclick="adHeal()">${T("⛑ Вылечить экипаж")}</button>`;
  if(S.expeditions.length) h+=`<button class="btn sm" onclick="adRush()">${T("🚪 Вернуть разведчиков")}</button>`;
  h+=`</div></div>`;
  return h;
}

/* ============================ СОХРАНЕНИЕ ============================ */
function saveGame(manual){
  try{
    S.lastSave=Date.now(); S._uid=uid;
    localStorage.setItem(KEY,JSON.stringify(S));
    YA.saveCloud(!!manual);
    if(manual) toast(T("💾 Сохранено"),"good");
  }catch(e){ if(manual) toast(T("Сохранение недоступно в этом окне"),"bad"); }
}
function loadGame(){
  try{
    const raw=localStorage.getItem(KEY);
    let data = raw ? JSON.parse(raw) : null;
    const cd = YA.cloudData;
    if(cd && (!data || (cd.lastSave||0) > (data.lastSave||0))) data = cd;
    if(!data) return false;
    S=data; uid=data._uid||1;
    migrateUnlocks();
    migrateItems();
    migrateRooms();
    S.dwellers.forEach(initDwellerHp);
    // оффлайн-прогресс
    offlineProgress();
    checkUnlocks();
    return true;
  }catch(e){ return false; }
}
function offlineProgress(){
  const now=Date.now();
  let elapsed=Math.floor((now-(S.lastSave||now))/1000);
  if(elapsed<5) return;
  const capT=Math.min(elapsed, 8*3600); // максимум 8 часов
  const before={...S.res}; const beforePop=S.dwellers.length;
  for(let i=0;i<capT;i++) tickOnce(true);
  S.lastSave=now;
  const mins=Math.floor(capT/60);
  let diff=[];
  for(const k in RES){ const d=Math.floor(S.res[k]-before[k]); if(Math.abs(d)>3) diff.push(`${RES[k].ic}${d>0?'+':''}${d}`); }
  const newPop=S.dwellers.length-beforePop;
  setTimeout(()=>{
    let msg=`${T("🌊 Пока вас не было (")}${mins} ${T("мин):")} `+ (diff.length?diff.join("  "):T("без изменений"));
    if(newPop>0) msg+=`  👥+${newPop}`;
    toast(msg,"good"); logEvent(msg,"");
    if(mins>=10 && !YA.introShown){ YA.introShown=true; setTimeout(()=>YA.fullscreen(),1800); }
  },400);
}
function exportSave(){
  saveGame();
  const raw=JSON.stringify(S);
  const blob=new Blob([raw],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="abyss-nerey-save.json"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast(T("⬇ Файл сохранения выгружен"),"good");
}
function importSave(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept=".json,application/json";
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ try{ S=JSON.parse(rd.result); uid=S._uid||1; migrateUnlocks(); migrateItems(); migrateRooms(); S.dwellers.forEach(initDwellerHp); offlineProgress(); checkUnlocks(); render(); toast(T("⬆ Сохранение загружено"),"good"); }catch(err){ toast(T("Файл повреждён"),"bad"); } };
    rd.readAsText(f);
  };
  inp.click();
}
function hardReset(){
  if(!confirm(T("Начать заново? Текущий прогресс будет удалён."))) return;
  try{localStorage.removeItem(KEY);}catch(e){}
  newGame(); render();
}

/* ============================ СТАРТ ============================ */
function boot(){
  $("intro").classList.add("hidden");
  $("app").classList.remove("hidden");
  S.dwellers.forEach(initDwellerHp);
  render();
}
applyStaticI18n();
YA.init();
document.getElementById("startBtn").onclick=()=>{ newGame(); boot(); saveGame(); };
document.getElementById("loadBtn").onclick=()=>{ if(loadGame()){ boot(); } else { toast(T("Сохранение не найдено"),"bad"); } };

// проверка наличия сейва для подсказки (локально или в облаке)
function refreshIntroHint(){
  try{
    const has = !!localStorage.getItem(KEY) || !!YA.cloudData;
    const el=$("introHint"); if(el && has) el.textContent=T("Найдено сохранение — можно продолжить.");
  }catch(e){}
}
refreshIntroHint();

// главный цикл
setInterval(()=>{ if(S){ tickOnce(false); render(); } },1000);
setInterval(()=>{ if(S) saveGame(false); },15000);
window.addEventListener("beforeunload",()=>{ if(S){ saveGame(false); YA.saveCloud(true); } });
document.addEventListener("visibilitychange",()=>{ if(document.hidden && S){ saveGame(false); YA.saveCloud(true); } });

// пузырьки для атмосферы
(function(){
  const c=$("bubbles");
  for(let i=0;i<26;i++){
    const b=document.createElement("div"); b.className="bub";
    const sz=3+Math.random()*14;
    b.style.width=b.style.height=sz+"px";
    b.style.left=Math.random()*100+"%";

    b.style.animationDelay=(-Math.random()*12)+"s";
    b.style.opacity=.15+Math.random()*.35;
    c.appendChild(b);
  }
})();

// экспорт функций в глобал (для onclick)
Object.assign(window,{setTab,pickCell,clearTarget,addFloor,skipTutorial,applyQuestHighlight,adBoost,adHeal,adRush,setLang,openRoom,openDweller,doBuild,doUpgrade,demolish,doResearch,craftItem,equip,unequip,assignDweller,startExpedition,rushDefense,saveGame,exportSave,importSave,hardReset,closeModal,dismissTut,openRespec,doRespec});
</script>
